  <style>
    :root{
      --bg:#0b0e14;
      --text:#e9eef7;

      --tile: 112px;
      --tileBig: 178px;
      --gap: 20px;

      --safeTop: 34px;
      --safeX: clamp(18px, 3.2vw, 48px);
      --popOffset: 28px;

      /* ✅ blur glass */
      --glassA: rgba(255,255,255,.10);
      --glassB: rgba(255,255,255,.06);
      --glassBorder: rgba(255,255,255,.22);
      --glassBorderOn: rgba(255,255,255,.42);
      --glassGlow: rgba(255,255,255,.18);

      /* ✅ fades */
      --fadeDur: 520ms;
      --fadeEase: cubic-bezier(.2,.8,.2,1);

      /* ✅ for canvas dots */
      --dotsBase: 0.010;   /* always faintly visible */
    }

    *{box-sizing:border-box}
    html,body{height:100%}

/* ✅ cross-fade background layers (smooth section transitions) */
.bg-layer{
  position:fixed; inset:0;
  z-index:-4;
  background:#000 center/cover no-repeat;
  opacity:0;
  transition: opacity .85s cubic-bezier(.2,.8,.2,1);
  filter: saturate(1.05) contrast(1.05) blur(2px);
  transform: scale(1.03);
  will-change: opacity, background-image, transform;
  animation: bgDrift 22s ease-in-out infinite alternate;
}
.bg-layer.active{ opacity:.98; }

/* slow ambient movement like macOS/Vision wallpapers */
@keyframes bgDrift{
  0%   { transform: translate3d(-0.6%, -0.4%, 0) scale(1.035); }
  50%  { transform: translate3d( 0.4%, -0.2%, 0) scale(1.05); }
  100% { transform: translate3d( 0.6%,  0.4%, 0) scale(1.04); }
}

/* ✅ dark overlay (keeps text readable) */
.bg{
  position:fixed; inset:0;
  z-index:-3;
  background: rgba(0,0,0,.38);
}

    body{
      margin:0;
      font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);
      background: var(--bg);
      overflow:hidden;
    }

    
    
    

    .vignette{
      position:fixed; inset:0; z-index:-1; pointer-events:none;
      background: radial-gradient(circle at 55% 35%,
        rgba(0,0,0,.0) 0,
        rgba(0,0,0,.30) 58%,
        rgba(0,0,0,.78) 100%);
    }

    .shell{
      height:100%;
      display:flex;
      flex-direction:column;
      padding: var(--safeTop) var(--safeX) 18px;
      gap: 18px;
      min-height: 0;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 16px;
      user-select:none;
      flex: 0 0 auto;
    }
    .topbar-left{display:flex;align-items:baseline;gap:18px;letter-spacing:.2px;}
    .topbar-left .tab{font-size:26px;font-weight:750;opacity:.95;}
    .topbar-right{display:flex;align-items:center;Hpx;opacity:.95;}
    .time{font-size:20px;opacity:.75;letter-spacing:.3px;white-space:nowrap;}

    .strip{
      display:flex;
      align-items:flex-end;
      gap: var(--gap);
      padding-top: 18px;
      padding-bottom: 10px;
      margin-top: 6px;
      min-height: calc(var(--tileBig) + 30px);
      overflow-x:auto;
      overflow-y:hidden;
      flex: 0 0 auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,.20) rgba(0,0,0,0);
    
      width: fit-content;
      position: relative;
      left: 0;
      transform: translateX(0);
      transition: left 420ms cubic-bezier(.2,.8,.2,1), transform 420ms cubic-bezier(.2,.8,.2,1);
    }

    /* ✅ On Home: center the main tiles above the welcome copy */
    body.homeMode .strip{
      left: 50%;
      transform: translateX(-50%);
    }

/* ✅ GLASS TILE (top row) */
    .tile{
      position:relative;
      width: var(--tile);
      height: var(--tile);
      border-radius: 26px;
      border: 1px solid var(--glassBorder);
      background: linear-gradient(180deg, var(--glassA), var(--glassB));
      box-shadow:
        0 18px 40px rgba(0,0,0,.30),
        inset 0 1px 0 rgba(255,255,255,.10);
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      transition: width .18s ease, height .18s ease, transform .18s ease, border-color .18s ease, background .18s ease, box-shadow .18s ease;
      flex: 0 0 auto;
      outline:none;
      color: inherit;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;

      /* glass blur */
      backdrop-filter: blur(16px) saturate(1.25);
      -webkit-backdrop-filter: blur(16px) saturate(1.25);
    }
    a.tile{ text-decoration:none; color:inherit; }

    .tile:focus-visible{
      box-shadow:
        0 0 0 3px rgba(255,255,255,.18),
        0 18px 40px rgba(0,0,0,.30),
        inset 0 1px 0 rgba(255,255,255,.12);
      border-color: var(--glassBorderOn);
    }
    .tile svg{ width:48px; height:48px; opacity:.92 }

    .tile .badge{
      position:absolute; right:14px; top:14px;
      width:10px; height:10px; border-radius:99px;
      background: rgba(255,255,255,.95);
      box-shadow: 0 0 0 3px rgba(255,255,255,.20);
      opacity:0;
      transition: opacity .18s ease;
    }
    .tile.active{
      width: var(--tileBig);
      height: var(--tileBig);
      border-color: var(--glassBorderOn);
      background: linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,.07));
      transform: translateY(-2px);
      box-shadow:
        0 22px 55px rgba(0,0,0,.35),
        0 0 0 1px rgba(255,255,255,.06),
        0 0 22px var(--glassGlow),
        inset 0 1px 0 rgba(255,255,255,.14);
    }
    .tile.active .badge{ opacity:1; }

    .tilewrap{display:flex;flex-direction:column;align-items:center;flex:0 0 auto;min-width:0;}
    .tile-label{
      margin-top: 12px;
      font-size: 20px;
      font-weight: 650;
      opacity:.92;
      transform: translateY(6px);
      transition: opacity .18s ease, transform .18s ease;
      white-space: nowrap;
      overflow: visible;
      padding: 0 8px;
      text-align:center;
      text-shadow: 0 2px 10px rgba(0,0,0,.35);
    }
    .tilewrap.active .tile-label{opacity:.96;transform: translateY(0);}

    .pop{
      display:none;
      margin-top: var(--popOffset);
      flex: 1 1 auto;
      min-height: 0;
      overflow: visible;

      /* smooth show/hide */
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 280ms var(--fadeEase), transform 280ms var(--fadeEase);
    }
    .pop.show{
      display:flex;
      opacity: 1;
      transform: translateY(0);
    }
    .popBody{
      flex: 1 1 auto;
      min-height: 0;
      display:flex;
      gap: 14px;
      flex-wrap:wrap;
      align-items:flex-start;
      overflow: hidden;
      padding-top: 10px;
    }

    /* ✅ GLASS SUBTILES (popup tiles) */
    .subtile{
      width: 300px;
      min-height: 128px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.18);
      background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.05));
      cursor:pointer;
      transition: transform .12s ease, border-color .12s ease, filter .12s ease, box-shadow .12s ease;
      display:flex;
      flex-direction:column;
      padding: 16px;
      outline:none;
      text-decoration:none;
      color: var(--text);
      box-shadow: 0 18px 50px rgba(0,0,0,.30);
      flex: 0 0 auto;

      backdrop-filter: blur(16px) saturate(1.25);
      -webkit-backdrop-filter: blur(16px) saturate(1.25);
    }
    .subtile:hover{
      transform: translateY(-2px);
      border-color: rgba(255,255,255,.34);
      filter: brightness(1.05);
      box-shadow: 0 22px 60px rgba(0,0,0,.38), 0 0 0 1px rgba(255,255,255,.06);
    }
    .subtile:focus-visible{
      box-shadow: 0 0 0 3px rgba(255,255,255,.14), 0 22px 60px rgba(0,0,0,.38);
      border-color: rgba(255,255,255,.46);
    }
    .subtile .t{ font-weight: 800; font-size: 17px; letter-spacing:.2px; }
    .subtile .d{ margin-top: 8px; color: rgba(233,238,247,.78); font-size: 13px; line-height: 1.35; }

    /* ✅ GLASS PANEL (tasks placeholder) */
    .glassPanel{
      width: min(980px, 100%);
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.18);
      background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.05));
      box-shadow: 0 18px 50px rgba(0,0,0,.30);
      padding: 14px;
      flex: 1 1 auto;
      min-height: 0;
      display:flex;
      flex-direction:column;

      backdrop-filter: blur(18px) saturate(1.25);
      -webkit-backdrop-filter: blur(18px) saturate(1.25);
    }

    @media (max-width: 980px){
      body{ overflow:auto; }
      .shell{ overflow:visible; }
      .pop{ overflow:visible; }
      .popBody{ overflow:visible; }
      .subtile{ width: min(100%, 460px); }
    }

    
  /* Tools tiles: simple fade-in (no wipe) */
  .tileFadeOnly{
    opacity:0;
    transform:translateY(8px);
    animation:tileFadeOnly .45s ease forwards;
    will-change:opacity,transform,filter;
  }
  @keyframes tileFadeOnly{
    to{opacity:1;transform:translateY(0);}
  }

  @media (prefers-reduced-motion: reduce){
      .bg-layer, .pop{ transition:none !important; }
    }
  
    /* ✅ User greeting + avatar */
    .userbox{display:flex;align-items:center;gap:12px;}
    .avatar{
      width:40px;height:40px;border-radius:999px;
      border: 1px solid rgba(255,255,255,.26);
      background: linear-gradient(180deg, rgba(255,255,255,.16), rgba(255,255,255,.06));
      box-shadow: 0 14px 34px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.12);
      display:flex;align-items:center;justify-content:center;
      font-weight:850;font-size:15px;letter-spacing:.6px;
      backdrop-filter: blur(16px) saturate(1.25);
      -webkit-backdrop-filter: blur(16px) saturate(1.25);
      user-select:none;
    }
    #welcomeUser{display:flex;align-items:center;gap:6px;}
    #username{opacity:.98;}
    .editName{
      opacity:0;
      margin-left:2px;
      font-size:16px;
      cursor:pointer;
      transform: translateY(1px) scale(.98);
      transition: opacity .18s ease, transform .18s ease, filter .18s ease;
      filter: drop-shadow(0 4px 10px rgba(0,0,0,.25));
    }
    .userbox:hover .editName{
      opacity:.65;
      transform: translateY(1px) scale(1);
    }
    .userbox .editName:hover{
      opacity:.95;
      filter: drop-shadow(0 6px 14px rgba(0,0,0,.35));
    }

  
    /* ✅ Welcome overlay (first login) */
    .welcomeOverlay{
      position:fixed; inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 24px;
      z-index: 50;
      background: radial-gradient(circle at 50% 35%,
        rgba(255,255,255,.06) 0%,
        rgba(0,0,0,.58) 55%,
        rgba(0,0,0,.82) 100%);
      opacity:0;
      pointer-events:none;
      transition: opacity 520ms var(--fadeEase);
    }
    .welcomeOverlay.show{
      opacity:1;
      pointer-events:auto;
    }
    .welcomeCard{
      width: min(560px, 100%);
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,.22);
      background: linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.06));
      box-shadow: 0 30px 90px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.10);
      padding: 22px 22px 18px;
      backdrop-filter: blur(18px) saturate(1.25);
      -webkit-backdrop-filter: blur(18px) saturate(1.25);
      transform: translateY(10px) scale(.985);
      transition: transform 520ms var(--fadeEase);
    }
    .welcomeOverlay.show .welcomeCard{ transform: translateY(0) scale(1); }
    .welcomeTitle{
      font-size: 34px;
      font-weight: 860;
      letter-spacing: .2px;
      margin-bottom: 6px;
      text-shadow: 0 10px 30px rgba(0,0,0,.45);
    }
    .welcomeSub{
      color: rgba(233,238,247,.78);
      font-size: 14px;
      line-height: 1.35;
      margin-bottom: 16px;
    }
    .welcomeForm{
      display:flex;
      gap: 10px;
      align-items:center;
    }
    .welcomeInput{
      flex: 1 1 auto;
      height: 44px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.22);
      background: rgba(0,0,0,.18);
      color: var(--text);
      padding: 0 14px;
      font-size: 15px;
      outline:none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
    }
    .welcomeInput:focus{
      border-color: rgba(255,255,255,.42);
      box-shadow: 0 0 0 3px rgba(255,255,255,.14), inset 0 1px 0 rgba(255,255,255,.08);
    }
    .welcomeBtn{
      height: 44px;
      padding: 0 16px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.24);
      background: linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,.08));
      color: var(--text);
      font-weight: 780;
      cursor:pointer;
      transition: transform .12s ease, filter .12s ease, border-color .12s ease;
      box-shadow: 0 18px 40px rgba(0,0,0,.35);
      backdrop-filter: blur(14px) saturate(1.25);
      -webkit-backdrop-filter: blur(14px) saturate(1.25);
    }
    .welcomeBtn:hover{ transform: translateY(-1px); filter: brightness(1.06); border-color: rgba(255,255,255,.38); }
    .welcomeBtn:active{ transform: translateY(0); filter: brightness(.98); }
    .welcomeHint{
      margin-top: 12px;
      font-size: 12px;
      color: rgba(233,238,247,.62);
    }

    /* Blur/soften the page behind overlay */
    body.hasWelcome .shell{
      filter: blur(10px) saturate(1.05);
      transform: scale(1.01);
      transition: filter 520ms var(--fadeEase), transform 520ms var(--fadeEase);
    }

  
    /* ✅ Departments grid (15 tiles, 5 per row, 16:9) */
    
    .popBody.grid5{
      display:grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;               /* still tight but roomier */
      align-items: stretch;
      overflow-y: auto;
      overflow-x: hidden;
      padding-top: 10px;
      padding-left: 12px;
      padding-right: 12px;
    }
    .popBody.grid5 .subtile{
      transform-origin: center;
      will-change: transform;

      width: 100%;
      min-height: 0;
      aspect-ratio: 16 / 9;
      border-radius: 24px;     /* rounder */
      padding: 16px;
      /* bigger tiles via container width + slightly larger pop area */
      box-shadow: 0 18px 48px rgba(0,0,0,.32);
      border-color: rgba(255,255,255,.20);
      transition: transform .14s ease, border-color .14s ease, filter .14s ease, box-shadow .14s ease;
    }
    /* Headings only now, but keep these harmless */
    .popBody.grid5 .subtile .t{ font-size: 16px; }
    .popBody.grid5 .subtile .d{ display:none; }

    @media (max-width: 1200px){
      .popBody.grid5{ grid-template-columns: repeat(4, minmax(0, 1fr)); }
    }
    @media (max-width: 980px){
      .popBody.grid5{ grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .popBody.grid5 .subtile{ aspect-ratio: 16 / 10; }
    }

    /* ✅ Responsive grid for Company Resources + Tools (auto-fit to container) */
    .popBody.autoGrid{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      align-items: stretch;

      /* allow hover pop-out without clipping */
      overflow: visible;
      padding-top: 18px;
      padding-left: 12px;
      padding-right: 12px;
    }
    .popBody.autoGrid .subtile{
      width: 100%;
      min-height: 0;
      aspect-ratio: 16 / 9;
      border-radius: 24px;
      padding: 16px;
      margin: 0; /* override toolCircle margin if present */
    }
    @media (max-width: 520px){
      .popBody.autoGrid{ grid-template-columns: 1fr; }
      .popBody.autoGrid .subtile{ aspect-ratio: 16 / 10; }
    }

  
    /* ✅ Department image tiles (headings only) */
    
.deptTile{
      background-size: cover;
      background-position: top center;
      position: relative;
      overflow: hidden;
    
      background-color: rgba(255,255,255,.03);
    }
    .deptTile::after{
      content:"";
      position:absolute;
      inset:0;
      background: transparent;
      pointer-events:none;
    }
    .deptTitle{
      position:absolute;
      left:16px;
      right:16px;
      bottom:14px;
      font-size:18px;
      font-weight:850;
      letter-spacing:.2px;
      text-shadow: 0 3px 10px rgba(0,0,0,.95);
      z-index:2;
    }

  
    .deptTile .d{display:none;}
  
    

  
    /* ✅ Hide scrollbars (prevents left sidebar/scrollbar flash) */
    .strip::-webkit-scrollbar,
    #popBody::-webkit-scrollbar{ width:0; height:0; }
    .strip, #popBody{ scrollbar-width: none; -ms-overflow-style: none; }

    /* Grid shouldn't scroll; keep content fitting the screen */
    .popBody.grid5{ overflow: hidden; }

  
    /* ✅ Theme button + menu */
    .themeBtn{
      height: 40px;
      padding: 0 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.22);
      background: linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,.06));
      color: var(--text);
      font-weight: 780;
      letter-spacing:.2px;
      cursor:pointer;
      box-shadow: 0 14px 34px rgba(0,0,0,.22), inset 0 1px 0 rgba(255,255,255,.10);
      backdrop-filter: blur(14px) saturate(1.25);
      -webkit-backdrop-filter: blur(14px) saturate(1.25);
      transition: transform .12s ease, filter .12s ease, border-color .12s ease;
      user-select:none;
    }
    .themeBtn:hover{ transform: translateY(-1px); filter: brightness(1.06); border-color: rgba(255,255,255,.40); }
    .themeBtn:active{ transform: translateY(0); filter: brightness(.98); }

    .themeMenu{
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      min-width: 160px;
      padding: 10px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.20);
      background: linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.06));
      box-shadow: 0 22px 70px rgba(0,0,0,.42);
      backdrop-filter: blur(18px) saturate(1.25);
      -webkit-backdrop-filter: blur(18px) saturate(1.25);
      display:none;
      z-index: 60;
    }
    .topbar-right{ position: relative; }
    .themeMenu.open{ display:block; animation: themePop 180ms var(--fadeEase); }
    @keyframes themePop{ from{ opacity:0; transform: translateY(-6px) scale(.98);} to{ opacity:1; transform: translateY(0) scale(1);} }

    .themeItem{
      width:100%;
      text-align:left;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.14);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 14px;
      cursor:pointer;
      font-weight: 700;
      margin: 6px 0;
      transition: transform .12s ease, filter .12s ease, border-color .12s ease;
    }
    .themeItem:hover{ transform: translateY(-1px); filter: brightness(1.10); border-color: rgba(255,255,255,.34); }
    .themeItem:active{ transform: translateY(0); filter: brightness(.98); }

    /* ✅ Theme presets */
    /* ✅ Theme presets (tiles only — text stays white) */
    :root[data-theme="white"]{
      --glassA: rgba(255,255,255,.26);
      --glassB: rgba(255,255,255,.10);
      --glassBorder: rgba(255,255,255,.30);
      --glassBorderOn: rgba(255,255,255,.55);
      --glassGlow: rgba(255,255,255,.22);
    }
    :root[data-theme="grey"]{
      --glassA: rgba(255,255,255,.16);
      --glassB: rgba(255,255,255,.06);
      --glassBorder: rgba(255,255,255,.22);
      --glassBorderOn: rgba(255,255,255,.44);
      --glassGlow: rgba(255,255,255,.18);
    }
    :root[data-theme="black"]{
      --glassA: rgba(255,255,255,.10);
      --glassB: rgba(255,255,255,.05);
      --glassBorder: rgba(255,255,255,.20);
      --glassBorderOn: rgba(255,255,255,.40);
      --glassGlow: rgba(255,255,255,.16);
    }
    :root[data-theme="blue"]{
      --glassA: rgba(80,150,255,.20);
      --glassB: rgba(80,150,255,.08);
      --glassBorder: rgba(120,180,255,.28);
      --glassBorderOn: rgba(170,210,255,.52);
      --glassGlow: rgba(120,180,255,.22);

  pointer-events:none;

/* soft drifting light bloom */
.bg-layer::before{
  background:
    radial-gradient(42% 36% at 18% 24%, rgba(255,255,255,.12), rgba(255,255,255,0) 62%),
    radial-gradient(34% 28% at 82% 18%, rgba(255,255,255,.08), rgba(255,255,255,0) 64%),
    radial-gradient(40% 34% at 56% 78%, rgba(255,255,255,.06), rgba(255,255,255,0) 66%);
  mix-blend-mode: screen;
  opacity: .42;
  animation: bgBloomDrift 20s ease-in-out infinite alternate;
}

/* ultra-subtle film grain / atmosphere */
.bg-layer::after{
  inset: -2%;
  opacity: .055;
  background-image:
    radial-gradient(rgba(255,255,255,.5) .6px, transparent .8px);
  background-size: 10px 10px;
  mix-blend-mode: soft-light;
  animation: bgGrainShift 9s steps(8) infinite;
}

@keyframes bgBloomDrift{
  0%   { transform: translate3d(-1.2%, -0.8%, 0) scale(1.02); opacity:.28; }
  50%  { transform: translate3d( 1.0%, -1.1%, 0) scale(1.06); opacity:.40; }
  100% { transform: translate3d( 0.6%,  1.0%, 0) scale(1.04); opacity:.34; }
}

@keyframes bgGrainShift{
  0%   { transform: translate3d(0,0,0); }
  25%  { transform: translate3d(-0.8%, 0.5%, 0); }
  50%  { transform: translate3d(0.6%, -0.4%, 0); }
  75%  { transform: translate3d(-0.4%, -0.6%, 0); }
  100% { transform: translate3d(0.8%, 0.4%, 0); }
}

  <script>
    // Clock removed (theme menu used instead)

    // Theme menu (persistent)
    const themeBtn = document.getElementById('themeBtn');
    const themeMenu = document.getElementById('themeMenu');
    const themeItems = Array.from(document.querySelectorAll('.themeSwatch'));

    function setTheme(t){
      document.documentElement.setAttribute('data-theme', t);
      localStorage.setItem('intranetTheme', t);
    }

    function loadTheme(){
      const saved = localStorage.getItem('intranetTheme') || 'black';
      setTheme(saved);
    }

    function closeThemeMenu(){
      themeMenu.classList.remove('open');
      themeBtn.setAttribute('aria-expanded','false');
    }

    themeBtn.addEventListener('click', (e)=>{
      e.preventDefault();
      const open = themeMenu.classList.toggle('open');
      themeBtn.setAttribute('aria-expanded', open ? 'true' : 'false');
    });

    themeItems.forEach(btn=>{
      btn.addEventListener('click', ()=>{
        setTheme(btn.dataset.theme);
        closeThemeMenu();
      });
    });

    document.addEventListener('click', (e)=>{
      if(!themeMenu.contains(e.target) && e.target !== themeBtn){
        closeThemeMenu();
      }
    });

    document.addEventListener('keydown', (e)=>{
      if(e.key === 'Escape'){ closeThemeMenu(); }
    });

    // Department submenu (blur + pop tiles)
    const subOverlay = document.getElementById('subOverlay');
    const subGrid = document.getElementById('subGrid');
    const subTitleEl = document.getElementById('subTitle');
    const subClose = document.getElementById('subClose');

    function openSubmenu(title, children){
      subTitleEl.textContent = title || 'Department';
      subGrid.innerHTML = '';
      (children||[]).forEach(ch=>{
        const b = document.createElement('a');
        b.className = 'subTile';
        b.href = ch.href || '#';
        b.target = '_self';
        b.rel = 'noopener noreferrer';
        b.textContent = ch.title || '';

        // Smart protocol handling for Teams / Copilot / OpenVPN
        b.addEventListener('click', (e)=>{
          if(openSmartLink(b.href)){ e.preventDefault(); return; }
        });

        subGrid.appendChild(b);
      });
      document.body.classList.add('subOpen');
      subOverlay.classList.add('show');
      subOverlay.setAttribute('aria-hidden','false');
    }

    function closeSubmenu(){
      subOverlay.classList.remove('show');
      subOverlay.setAttribute('aria-hidden','true');
      setTimeout(()=> document.body.classList.remove('subOpen'), 220);
    }

    subClose.addEventListener('click', closeSubmenu);
    subOverlay.addEventListener('click', (e)=>{ if(e.target === subOverlay) closeSubmenu(); });
    document.addEventListener('keydown', (e)=>{ if(e.key === 'Escape' && subOverlay.classList.contains('show')) closeSubmenu(); });


    function launchProtocol(url){
      if(!url) return false;
      try{
        const iframe = document.createElement('iframe');
        iframe.style.display = 'none';
        iframe.setAttribute('aria-hidden', 'true');
        iframe.src = url;
        document.body.appendChild(iframe);
        setTimeout(()=> iframe.remove(), 1500);
        return true;
      }catch(e){
        try { window.location.href = url; return true; } catch(err){}
      }
      return false;
    }

    function openExternalInEdge(url){
      if(!url) return false;
      try{
        const a = document.createElement('a');
        a.href = url;
        a.target = '_blank';
        a.rel = 'noopener noreferrer external';
        a.style.display = 'none';
        document.body.appendChild(a);
        a.click();
        setTimeout(()=> a.remove(), 0);

        const proto = /^msteams:/i.test(url) ? url : url.replace(/^https:\/\/teams\.microsoft\.com/i, 'msteams:');

const BG_BY_KEY = {
  home:        "https://stingraymanufacturers.github.io/departmenttiles/home.webp",

// background cross-fade engine (New: two-layer fade, no flicker)
const bgL1 = document.getElementById("bgLayer1");
const bgL2 = document.getElementById("bgLayer2");
let activeLayer = 1;

// preload images
const _preloaded = new Map();
function preload(url){
  if(!url) return Promise.resolve();
  if(_preloaded.has(url)) return _preloaded.get(url);
  const p = new Promise((res)=>{
    const img = new Image();
    img.onload = ()=>res(true);
    img.onerror = ()=>res(false);
    img.src = url;
  });
  _preloaded.set(url, p);
  return p;
}
Object.values(BG_BY_KEY).forEach(preload);

let bgSwapToken = 0;
async function setBg(key){
  const url = BG_BY_KEY[key];
  if(!url) return;

  const token = ++bgSwapToken;
  await preload(url);
  if(token !== bgSwapToken) return;

  const incoming = (activeLayer === 1) ? bgL2 : bgL1;
  const outgoing = (activeLayer === 1) ? bgL1 : bgL2;

  incoming.style.backgroundImage = `url("${url}")`;
  incoming.classList.add("active");
  outgoing.classList.remove("active");

  activeLayer = (activeLayer === 1) ? 2 : 1;
}

// Tile actions (Teams submenu + Copilot sidebar)
    document.addEventListener("click", (e)=>{

      // Teams: open a small popup panel with 3 actions
      if(label === "Teams"){

        // Build a mini popup using your existing pop system
        fadePopTo(()=>{

          popBody.innerHTML = `

                </a>
                <a class="subtile" href="#" data-teams="calendar">

                </a>
                <a class="subtile" href="#" data-teams="chat">
                  <div class="t">New Chat</div>
                  <div class="d">Start a new chat.</div>
                </a>
              </div>
            </div>
          `;
        });
        return;
      }
    });

    // Handle Teams submenu actions (desktop app only)
    document.addEventListener("click", (e)=>{
      const el = e.target.closest("[data-teams]");
      if(!el) return;
      e.preventDefault();
      const kind = el.getAttribute("data-teams");

      if(kind === "calendar"){
        openTeamsDeepLink("calendar");
        return;
      }
      if(kind === "chat"){
        openTeamsDeepLink("chat");
        return;
      }
      // Create a meeting
      openTeamsDeepLink("meeting");
    });



    // OpenVPN protocol handler reliability
    document.addEventListener("click", (e)=>{
      const a = e.target.closest(".subtile");
      if(!a) return;
      const label = a.querySelector(".t")?.textContent?.trim();
      if(label !== "OpenVPN") return;
      e.preventDefault();
      launchProtocol("openvpn://");
    });



    // ===== Teams: open mini tools overlay above tile =====
    function openTeamsOverlay(){
      const teamsTool = document.getElementById('teamsTool');
      const overlay = document.getElementById('teamsOverlay');
      const rail = document.getElementById('teamsFabRail');
      if(!teamsTool || !overlay || !rail) return;

      function positionOverlay(){
        const r = teamsTool.getBoundingClientRect();
        const wrap = overlay.querySelector('.teams-fab-wrap');
        if(!wrap) return;
        const top = Math.max(90, r.top - 120);
        wrap.style.top = top + 'px';
      }

      function openOverlay(e){
        if(e){
          e.preventDefault();
          e.stopPropagation();
          if(e.stopImmediatePropagation) e.stopImmediatePropagation();
        }
        positionOverlay();
        overlay.classList.add('is-open');
        overlay.setAttribute('aria-hidden','false');
        rail.setAttribute('aria-hidden','false');
        document.body.style.overflow = 'hidden';
      }

      function closeOverlay(){
        overlay.classList.remove('is-open');
        overlay.setAttribute('aria-hidden','true');
        rail.setAttribute('aria-hidden','true');
        document.body.style.overflow = '';
      }

      teamsTool.addEventListener('click', openOverlay, true);

      overlay.addEventListener('click', (e)=>{
        const close = e.target.closest('[data-close="teams"]');
        if(close) closeOverlay();
        // click outside rail closes too
        if(e.target === overlay) closeOverlay();
      });

      window.addEventListener('keydown', (e)=>{
        if(e.key === 'Escape' && overlay.classList.contains('is-open')) closeOverlay();
      });

      window.addEventListener('resize', ()=>{
        if(overlay.classList.contains('is-open')) positionOverlay();
      }, { passive:true });

      window.addEventListener('scroll', ()=>{
        if(overlay.classList.contains('is-open')) positionOverlay();
      }, { passive:true });
    }

    // init teams overlay binding
    (function(){ openTeamsOverlay(); })();


    // start on Departments background
    setBg("home");
    setActive(0);

<script>
(function(){
  const toolsArea = document.querySelector('.popBody.toolsArea') || document.getElementById('popBody');

  function bindMagnetic(root){
    if(!root) return;
    const getTools = () => Array.from(root.querySelectorAll('.subtile.toolCircle'));
    let raf = null;

    function clearState(){
      root.classList.remove('is-magnetic');
      getTools().forEach(el => {
        el.classList.remove('near','far');
        el.style.removeProperty('--toolScale');
      });
    }

    function applyProximity(mx, my){
      const tools = getTools();
      if(!tools.length) return;
      root.classList.add('is-magnetic');

      tools.forEach(el => {
        const r = el.getBoundingClientRect();
        const cx = r.left + r.width / 2;
        const cy = r.top + r.height / 2;
        const dx = mx - cx;
        const dy = my - cy;
        const dist = Math.sqrt(dx*dx + dy*dy);

        el.classList.remove('near','far');
        if(dist < 90){
          el.classList.add('near');
        } else if(dist < 170){
          el.classList.add('far');
        }
      });
    }

    root.addEventListener('mousemove', (e) => {
      if(raf) cancelAnimationFrame(raf);
      raf = requestAnimationFrame(() => applyProximity(e.clientX, e.clientY));
    });

    root.addEventListener('mouseleave', clearState);

    // Also clear when switching sections/tabs so no stale visual state remains
    document.addEventListener('click', (e) => {
      const t = e.target.closest('[data-key]');
      if(t && t.getAttribute('data-key') !== 'tools') clearState();
    });
  }

  // Delay slightly so existing page scripts finish building the tools section
  window.addEventListener('load', () => {
    const candidate = document.querySelector('.popBody.toolsArea') || document.getElementById('popBody');
    bindMagnetic(candidate);
  });
})();
</script>


<script>
/* ===== Make section backgrounds feel alive ===== */
(function(){
  const layers = [document.getElementById('bgLayer1'), document.getElementById('bgLayer2')].filter(Boolean);
  if(!layers.length) return;

  let tx = 0, ty = 0, cx = 0, cy = 0, raf = null;

  function setTargetFromPointer(clientX, clientY){
    const x = (clientX / window.innerWidth) - 0.5;
    const y = (clientY / window.innerHeight) - 0.5;
    tx = x * 14;   // gentle horizontal drift
    ty = y * 10;   // gentle vertical drift
    kick();
  }

  function setIdleTarget(){
    tx = 0;
    ty = 0;
    kick();
  }

  function frame(){
    cx += (tx - cx) * 0.06;
    cy += (ty - cy) * 0.06;

    layers.forEach((layer, i) => {
      const depth = i === 0 ? 1 : 0.7;
      layer.style.setProperty('--bgmx', (cx * depth).toFixed(2) + 'px');
      layer.style.setProperty('--bgmy', (cy * depth).toFixed(2) + 'px');
    });

    if(Math.abs(tx - cx) > 0.02 || Math.abs(ty - cy) > 0.02){
      raf = requestAnimationFrame(frame);
    } else {
      raf = null;
    }
  }

  function kick(){
    if(!raf) raf = requestAnimationFrame(frame);
  }

  window.addEventListener('mousemove', (e) => setTargetFromPointer(e.clientX, e.clientY), {passive:true});
  window.addEventListener('mouseleave', setIdleTarget, {passive:true});
  window.addEventListener('blur', setIdleTarget);

  // subtle autonomous breathing motion even when idle
  let t = 0;
  setInterval(() => {
    if(raf) return;
    t += 0.6;
    tx = Math.sin(t) * 2.4;
    ty = Math.cos(t * 0.8) * 1.8;
    kick();
  }, 1600);
})();
</script>


<script>
document.addEventListener("DOMContentLoaded",function(){

  const thumb = document.getElementById("scrollThumb");
  const popBody = document.querySelector(".popBody") || document.body;

  thumb.addEventListener("mousedown", function(e){
    e.preventDefault();

    function move(ev){
      const delta = ev.movementY;
      popBody.scrollBy({
        top: delta * 8,
        behavior: "auto"
      });
    }

    function stop(){
      document.removeEventListener("mousemove", move);
      document.removeEventListener("mouseup", stop);
    }

    document.addEventListener("mousemove", move);
    document.addEventListener("mouseup", stop);
  });

});
</script>

    }

  });
});

<script>
(function(){
  function fitHomeViewport(){
    const body = document.body;
    if(!body) return;
    body.classList.add('compactHome');

    const shell = document.querySelector('.shell');
    const strip = document.querySelector('.strip');
    const intro = document.querySelector('.homeIntro');
    const popBody = document.querySelector('.popBody');
    if(!shell || !strip || !intro || !body.classList.contains('homeMode')){
      if(intro){
        intro.style.transform = '';
        intro.style.marginBottom = '';
      }
      return;
    }

    intro.style.transform = '';
    intro.style.marginBottom = '';

    const shellStyles = getComputedStyle(shell);
    const gap = parseFloat(shellStyles.gap) || 0;
    const topbarH = document.querySelector('.topbar')?.offsetHeight || 0;
    const available = shell.clientHeight - topbarH - gap - 6;

    const stripH = strip.offsetHeight;
    const popH = popBody.offsetHeight || intro.offsetHeight;
    const total = stripH + popH;

    if(total > available){
      const scale = Math.max(0.80, Math.min(1, available / total));
      intro.style.transform = 'scale(' + scale.toFixed(3) + ')';
      intro.style.marginBottom = '-' + Math.round((1 - scale) * intro.offsetHeight) + 'px';
    }
  }

  const runFit = () => requestAnimationFrame(fitHomeViewport);
  document.addEventListener('DOMContentLoaded', () => {
    runFit();
    setTimeout(runFit, 150);
    setTimeout(runFit, 500);
  });
  window.addEventListener('load', runFit);
  window.addEventListener('resize', runFit, {passive:true});
  window.addEventListener('orientationchange', runFit, {passive:true});
  document.addEventListener('click', (e) => {
    const t = e.target.closest('[data-key], .tile, .subtile, .scrollNavBtn, .navBtn');
    if(t) setTimeout(runFit, 120);
  }, true);
})();
</script>
