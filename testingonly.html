  <style>
    :root{
      --bg:#0b0e14;
      --text:#e9eef7;

      --tile: 112px;
      --tileBig: 178px;
      --gap: 20px;

      --safeTop: 34px;
      --safeX: clamp(18px, 3.2vw, 48px);
      --popOffset: 28px;

      /* ✅ blur glass */
      --glassA: rgba(255,255,255,.10);
      --glassB: rgba(255,255,255,.06);
      --glassBorder: rgba(255,255,255,.22);
      --glassBorderOn: rgba(255,255,255,.42);
      --glassGlow: rgba(255,255,255,.18);

      /* ✅ fades */
      --fadeDur: 520ms;
      --fadeEase: cubic-bezier(.2,.8,.2,1);

      /* ✅ for canvas dots */
      --dotsBase: 0.010;   /* always faintly visible */
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);
      background: var(--bg);
      overflow:hidden;
    }

    /* ✅ dynamic background image (switches per tile) */
    .bgImage{
      position:fixed; inset:0;
      z-index:-3;
      background:#000 center/cover no-repeat;
      transition: opacity var(--fadeDur) var(--fadeEase), filter .25s ease, transform .25s ease;
      opacity: .98;
      filter: saturate(1.05) contrast(1.05);
      transform: scale(1.02);
      will-change: opacity, background-image;
    }
    .bgImage.fadeOut{ opacity: 0; }

    /* ✅ dark overlay (lets image show through) */
    .bg{
      position:fixed; inset:0;
      z-index:-4;
      background: rgba(0,0,0,.38);
    }

    

    .vignette{
      position:fixed; inset:0; z-index:-1; pointer-events:none;
      background: radial-gradient(circle at 55% 35%,
        rgba(0,0,0,.0) 0,
        rgba(0,0,0,.30) 58%,
        rgba(0,0,0,.78) 100%);
    }

    .shell{
      height:100%;
      display:flex;
      flex-direction:column;
      padding: var(--safeTop) var(--safeX) 18px;
      gap: 18px;
      min-height: 0;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 16px;
      user-select:none;
      flex: 0 0 auto;
    }
    .topbar-left{display:flex;align-items:baseline;gap:18px;letter-spacing:.2px;}
    .topbar-left .tab{font-size:26px;font-weight:750;opacity:.95;}
    .topbar-right{display:flex;align-items:center;Hpx;opacity:.95;}
    .time{font-size:20px;opacity:.75;letter-spacing:.3px;white-space:nowrap;}

    .strip{
      display:flex;
      align-items:flex-end;
      gap: var(--gap);
      padding-top: 18px;
      padding-bottom: 10px;
      margin-top: 6px;
      min-height: calc(var(--tileBig) + 30px);
      overflow-x:auto;
      overflow-y:hidden;
      flex: 0 0 auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,.20) rgba(0,0,0,0);
    }

    /* ✅ GLASS TILE (top row) */
    .tile{
      position:relative;
      width: var(--tile);
      height: var(--tile);
      border-radius: 26px;
      border: 1px solid var(--glassBorder);
      background: linear-gradient(180deg, var(--glassA), var(--glassB));
      box-shadow:
        0 18px 40px rgba(0,0,0,.30),
        inset 0 1px 0 rgba(255,255,255,.10);
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      transition: width .18s ease, height .18s ease, transform .18s ease, border-color .18s ease, background .18s ease, box-shadow .18s ease;
      flex: 0 0 auto;
      outline:none;
      color: inherit;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;

      /* glass blur */
      backdrop-filter: blur(16px) saturate(1.25);
      -webkit-backdrop-filter: blur(16px) saturate(1.25);
    }
    a.tile{ text-decoration:none; color:inherit; }

    .tile:focus-visible{
      box-shadow:
        0 0 0 3px rgba(255,255,255,.18),
        0 18px 40px rgba(0,0,0,.30),
        inset 0 1px 0 rgba(255,255,255,.12);
      border-color: var(--glassBorderOn);
    }
    .tile svg{ width:48px; height:48px; opacity:.92 }

    .tile .badge{
      position:absolute; right:14px; top:14px;
      width:10px; height:10px; border-radius:99px;
      background: rgba(255,255,255,.95);
      box-shadow: 0 0 0 3px rgba(255,255,255,.20);
      opacity:0;
      transition: opacity .18s ease;
    }
    .tile.active{
      width: var(--tileBig);
      height: var(--tileBig);
      border-color: var(--glassBorderOn);
      background: linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,.07));
      transform: translateY(-2px);
      box-shadow:
        0 22px 55px rgba(0,0,0,.35),
        0 0 0 1px rgba(255,255,255,.06),
        0 0 22px var(--glassGlow),
        inset 0 1px 0 rgba(255,255,255,.14);
    }
    .tile.active .badge{ opacity:1; }

    .tilewrap{display:flex;flex-direction:column;align-items:center;flex:0 0 auto;min-width:0;}
    .tile-label{
      margin-top: 12px;
      font-size: 20px;
      font-weight: 650;
      opacity:.92;
      transform: translateY(6px);
      transition: opacity .18s ease, transform .18s ease;
      white-space: nowrap;
      overflow: visible;
      padding: 0 8px;
      text-align:center;
      text-shadow: 0 2px 10px rgba(0,0,0,.35);
    }
    .tilewrap.active .tile-label{opacity:.96;transform: translateY(0);}

    .pop{
      display:none;
      margin-top: var(--popOffset);
      flex: 1 1 auto;
      min-height: 0;
      overflow: visible;

      /* smooth show/hide */
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 280ms var(--fadeEase), transform 280ms var(--fadeEase);
    }
    .pop.show{
      display:flex;
      opacity: 1;
      transform: translateY(0);
    }
    .popBody{
      flex: 1 1 auto;
      min-height: 0;
      display:flex;
      gap: 14px;
      flex-wrap:wrap;
      align-items:flex-start;
      overflow: hidden;
      padding-top: 10px;
    }

    /* ✅ GLASS SUBTILES (popup tiles) */
    .subtile{
      width: 300px;
      min-height: 128px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.18);
      background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.05));
      cursor:pointer;
      transition: transform .12s ease, border-color .12s ease, filter .12s ease, box-shadow .12s ease;
      display:flex;
      flex-direction:column;
      padding: 16px;
      outline:none;
      text-decoration:none;
      color: var(--text);
      box-shadow: 0 18px 50px rgba(0,0,0,.30);
      flex: 0 0 auto;

      backdrop-filter: blur(16px) saturate(1.25);
      -webkit-backdrop-filter: blur(16px) saturate(1.25);
    }
    .subtile:hover{
      transform: translateY(-2px);
      border-color: rgba(255,255,255,.34);
      filter: brightness(1.05);
      box-shadow: 0 22px 60px rgba(0,0,0,.38), 0 0 0 1px rgba(255,255,255,.06);
    }
    .subtile:focus-visible{
      box-shadow: 0 0 0 3px rgba(255,255,255,.14), 0 22px 60px rgba(0,0,0,.38);
      border-color: rgba(255,255,255,.46);
    }
    .subtile .t{ font-weight: 800; font-size: 17px; letter-spacing:.2px; }
    .subtile .d{ margin-top: 8px; color: rgba(233,238,247,.78); font-size: 13px; line-height: 1.35; }

    /* ✅ GLASS PANEL (tasks placeholder) */
    .glassPanel{
      width: min(980px, 100%);
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.18);
      background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.05));
      box-shadow: 0 18px 50px rgba(0,0,0,.30);
      padding: 14px;
      flex: 1 1 auto;
      min-height: 0;
      display:flex;
      flex-direction:column;

      backdrop-filter: blur(18px) saturate(1.25);
      -webkit-backdrop-filter: blur(18px) saturate(1.25);
    }

    @media (max-width: 980px){
      body{ overflow:auto; }
      .shell{ overflow:visible; }
      .pop{ overflow:visible; }
      .popBody{ overflow:visible; }
      .subtile{ width: min(100%, 460px); }
    }

    @media (prefers-reduced-motion: reduce){
      .bgImage, .pop{ transition:none !important; }
    }
  
    /* ✅ User greeting + avatar */
    .userbox{display:flex;align-items:center;gap:12px;}
    .avatar{
      width:40px;height:40px;border-radius:999px;
      border: 1px solid rgba(255,255,255,.26);
      background: linear-gradient(180deg, rgba(255,255,255,.16), rgba(255,255,255,.06));
      box-shadow: 0 14px 34px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.12);
      display:flex;align-items:center;justify-content:center;
      font-weight:850;font-size:15px;letter-spacing:.6px;
      backdrop-filter: blur(16px) saturate(1.25);
      -webkit-backdrop-filter: blur(16px) saturate(1.25);
      user-select:none;
    }
    #welcomeUser{display:flex;align-items:center;gap:6px;}
    #username{opacity:.98;}
    .editName{
      opacity:0;
      margin-left:2px;
      font-size:16px;
      cursor:pointer;
      transform: translateY(1px) scale(.98);
      transition: opacity .18s ease, transform .18s ease, filter .18s ease;
      filter: drop-shadow(0 4px 10px rgba(0,0,0,.25));
    }
    .userbox:hover .editName{
      opacity:.65;
      transform: translateY(1px) scale(1);
    }
    .userbox .editName:hover{
      opacity:.95;
      filter: drop-shadow(0 6px 14px rgba(0,0,0,.35));
    }

  
    /* ✅ Welcome overlay (first login) */
    .welcomeOverlay{
      position:fixed; inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 24px;
      z-index: 50;
      background: radial-gradient(circle at 50% 35%,
        rgba(255,255,255,.06) 0%,
        rgba(0,0,0,.58) 55%,
        rgba(0,0,0,.82) 100%);
      opacity:0;
      pointer-events:none;
      transition: opacity 520ms var(--fadeEase);
    }
    .welcomeOverlay.show{
      opacity:1;
      pointer-events:auto;
    }
    .welcomeCard{
      width: min(560px, 100%);
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,.22);
      background: linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.06));
      box-shadow: 0 30px 90px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.10);
      padding: 22px 22px 18px;
      backdrop-filter: blur(18px) saturate(1.25);
      -webkit-backdrop-filter: blur(18px) saturate(1.25);
      transform: translateY(10px) scale(.985);
      transition: transform 520ms var(--fadeEase);
    }
    .welcomeOverlay.show .welcomeCard{ transform: translateY(0) scale(1); }
    .welcomeTitle{
      font-size: 34px;
      font-weight: 860;
      letter-spacing: .2px;
      margin-bottom: 6px;
      text-shadow: 0 10px 30px rgba(0,0,0,.45);
    }
    .welcomeSub{
      color: rgba(233,238,247,.78);
      font-size: 14px;
      line-height: 1.35;
      margin-bottom: 16px;
    }
    .welcomeForm{
      display:flex;
      gap: 10px;
      align-items:center;
    }
    .welcomeInput{
      flex: 1 1 auto;
      height: 44px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.22);
      background: rgba(0,0,0,.18);
      color: var(--text);
      padding: 0 14px;
      font-size: 15px;
      outline:none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
    }
    .welcomeInput:focus{
      border-color: rgba(255,255,255,.42);
      box-shadow: 0 0 0 3px rgba(255,255,255,.14), inset 0 1px 0 rgba(255,255,255,.08);
    }
    .welcomeBtn{
      height: 44px;
      padding: 0 16px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.24);
      background: linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,.08));
      color: var(--text);
      font-weight: 780;
      cursor:pointer;
      transition: transform .12s ease, filter .12s ease, border-color .12s ease;
      box-shadow: 0 18px 40px rgba(0,0,0,.35);
      backdrop-filter: blur(14px) saturate(1.25);
      -webkit-backdrop-filter: blur(14px) saturate(1.25);
    }
    .welcomeBtn:hover{ transform: translateY(-1px); filter: brightness(1.06); border-color: rgba(255,255,255,.38); }
    .welcomeBtn:active{ transform: translateY(0); filter: brightness(.98); }
    .welcomeHint{
      margin-top: 12px;
      font-size: 12px;
      color: rgba(233,238,247,.62);
    }

    /* Blur/soften the page behind overlay */
    body.hasWelcome .shell{
      filter: blur(10px) saturate(1.05);
      transform: scale(1.01);
      transition: filter 520ms var(--fadeEase), transform 520ms var(--fadeEase);
    }

  
    /* ✅ Departments grid (15 tiles, 5 per row, 16:9) */
    
    .popBody.grid5{
      display:grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;               /* still tight but roomier */
      align-items: stretch;
      overflow-y: auto;
      overflow-x: hidden;
      padding-top: 10px;
      padding-left: 12px;
      Jpx;
    
      padding-right: 12px;
    }
    .popBody.grid5 .subtile{
      transform-origin: center;
      will-change: transform;

      width: 100%;
      min-height: 0;
      aspect-ratio: 16 / 9;
      border-radius: 24px;     /* rounder */
      padding: 16px;
      /* bigger tiles via container width + slightly larger pop area */
      box-shadow: 0 18px 48px rgba(0,0,0,.32);
      border-color: rgba(255,255,255,.20);
      transition: transform .14s ease, border-color .14s ease, filter .14s ease, box-shadow .14s ease;
    }
    /* Headings only now, but keep these harmless */
    .popBody.grid5 .subtile .t{ font-size: 16px; }
    .popBody.grid5 .subtile .d{ display:none; }

    @media (max-width: 1200px){
      .popBody.grid5{ grid-template-columns: repeat(4, minmax(0, 1fr)); }
    }
    @media (max-width: 980px){
      .popBody.grid5{ grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .popBody.grid5 .subtile{ aspect-ratio: 16 / 10; }
    }

  
    /* ✅ Department image tiles (headings only) */
    .deptTile{
      background-size: cover;
      background-position: top center;
      position: relative;
      overflow: hidden;
    
      background-color: rgba(255,255,255,.03);
    }
    .deptTile::after{
      content:"";
      position:absolute;
      inset:0;
      background: transparent;
      pointer-events:none;
    }
    .deptTitle{
      position:absolute;
      left:16px;
      right:16px;
      bottom:14px;
      font-size:18px;
      font-weight:850;
      letter-spacing:.2px;
      text-shadow: 0 3px 10px rgba(0,0,0,.95);
      z-index:2;
    }

  
    .deptTile .d{display:none;}
  
    /* ✅ Stronger pop-out on hover (Departments) */
    .deptTile:hover{
      transform: translateY(-8px) scale(1.04);
      border-color: rgba(255,255,255,.48);
      filter: brightness(1.10) saturate(1.10);
      box-shadow:
        0 30px 80px rgba(0,0,0,.55),
        0 0 0 1px rgba(255,255,255,.10),
        0 0 26px rgba(255,255,255,.14);
    }
    .deptTile:focus-visible{
      transform: translateY(-6px) scale(1.03);
      border-color: rgba(255,255,255,.55);
      box-shadow:
        0 0 0 3px rgba(255,255,255,.18),
        0 30px 80px rgba(0,0,0,.55);
    }

  
    /* ✅ Hide scrollbars (prevents left sidebar/scrollbar flash) */
    .strip::-webkit-scrollbar,
    #popBody::-webkit-scrollbar{ width:0; height:0; }
    .strip, #popBody{ scrollbar-width: none; -ms-overflow-style: none; }

    /* Grid shouldn't scroll; keep content fitting the screen */
    .popBody.grid5{ overflow: hidden; }

  
    /* ✅ Theme button + menu */
    .themeBtn{
      height: 40px;
      padding: 0 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.22);
      background: linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,.06));
      color: var(--text);
      font-weight: 780;
      letter-spacing:.2px;
      cursor:pointer;
      box-shadow: 0 14px 34px rgba(0,0,0,.22), inset 0 1px 0 rgba(255,255,255,.10);
      backdrop-filter: blur(14px) saturate(1.25);
      -webkit-backdrop-filter: blur(14px) saturate(1.25);
      transition: transform .12s ease, filter .12s ease, border-color .12s ease;
      user-select:none;
    }
    .themeBtn:hover{ transform: translateY(-1px); filter: brightness(1.06); border-color: rgba(255,255,255,.40); }
    .themeBtn:active{ transform: translateY(0); filter: brightness(.98); }

    .themeMenu{
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      min-width: 160px;
      padding: 10px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.20);
      background: linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.06));
      box-shadow: 0 22px 70px rgba(0,0,0,.42);
      backdrop-filter: blur(18px) saturate(1.25);
      -webkit-backdrop-filter: blur(18px) saturate(1.25);
      display:none;
      z-index: 60;
    }
    .topbar-right{ position: relative; }
    .themeMenu.open{ display:block; animation: themePop 180ms var(--fadeEase); }
    @keyframes themePop{ from{ opacity:0; transform: translateY(-6px) scale(.98);} to{ opacity:1; transform: translateY(0) scale(1);} }

    .themeItem{
      width:100%;
      text-align:left;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.14);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 14px;
      cursor:pointer;
      font-weight: 700;
      margin: 6px 0;
      transition: transform .12s ease, filter .12s ease, border-color .12s ease;
    }
    .themeItem:hover{ transform: translateY(-1px); filter: brightness(1.10); border-color: rgba(255,255,255,.34); }
    .themeItem:active{ transform: translateY(0); filter: brightness(.98); }

    /* ✅ Theme presets */
    /* ✅ Theme presets (tiles only — text stays white) */
    :root[data-theme="white"]{
      --glassA: rgba(255,255,255,.26);
      --glassB: rgba(255,255,255,.10);
      --glassBorder: rgba(255,255,255,.30);
      --glassBorderOn: rgba(255,255,255,.55);
      --glassGlow: rgba(255,255,255,.22);
    }
    :root[data-theme="grey"]{
      --glassA: rgba(255,255,255,.16);
      --glassB: rgba(255,255,255,.06);
      --glassBorder: rgba(255,255,255,.22);
      --glassBorderOn: rgba(255,255,255,.44);
      --glassGlow: rgba(255,255,255,.18);
    }
    :root[data-theme="black"]{
      --glassA: rgba(255,255,255,.10);
      --glassB: rgba(255,255,255,.05);
      --glassBorder: rgba(255,255,255,.20);
      --glassBorderOn: rgba(255,255,255,.40);
      --glassGlow: rgba(255,255,255,.16);
    }
    :root[data-theme="blue"]{
      --glassA: rgba(80,150,255,.20);
      --glassB: rgba(80,150,255,.08);
      --glassBorder: rgba(120,180,255,.28);
      --glassBorderOn: rgba(170,210,255,.52);
      --glassGlow: rgba(120,180,255,.22);
    }
    :root[data-theme="red"]{
      --glassA: rgba(255,90,110,.18);
      --glassB: rgba(255,90,110,.07);
      --glassBorder: rgba(255,140,155,.26);
      --glassBorderOn: rgba(255,185,195,.50);
      --glassGlow: rgba(255,120,135,.22);
    }
    :root[data-theme="purple"]{
      --glassA: rgba(170,110,255,.20);
      --glassB: rgba(170,110,255,.08);
      --glassBorder: rgba(200,160,255,.28);
      --glassBorderOn: rgba(225,205,255,.52);
      --glassGlow: rgba(200,160,255,.22);
    }
    :root[data-theme="green"]{
      --glassA: rgba(90,255,180,.18);
      --glassB: rgba(90,255,180,.07);
      --glassBorder: rgba(140,255,205,.26);
      --glassBorderOn: rgba(190,255,230,.50);
      --glassGlow: rgba(140,255,205,.22);
    }
    :root[data-theme="yellow"]{
      --glassA: rgba(255,215,90,.20);
      --glassB: rgba(255,215,90,.08);
      --glassBorder: rgba(255,235,170,.28);

  <script>
    // Clock removed (theme menu used instead)

    // Theme menu (persistent)
    const themeBtn = document.getElementById('themeBtn');
    const themeMenu = document.getElementById('themeMenu');
    const themeItems = Array.from(document.querySelectorAll('.themeSwatch'));

    function setTheme(t){
      document.documentElement.setAttribute('data-theme', t);
      localStorage.setItem('intranetTheme', t);
    }

    function loadTheme(){
      const saved = localStorage.getItem('intranetTheme') || 'black';
      setTheme(saved);
    }

    function closeThemeMenu(){
      themeMenu.classList.remove('open');
      themeBtn.setAttribute('aria-expanded','false');
    }

    themeBtn.addEventListener('click', (e)=>{
      e.preventDefault();
      const open = themeMenu.classList.toggle('open');
      themeBtn.setAttribute('aria-expanded', open ? 'true' : 'false');
    });

    themeItems.forEach(btn=>{
      btn.addEventListener('click', ()=>{
        setTheme(btn.dataset.theme);
        closeThemeMenu();
      });
    });

    document.addEventListener('click', (e)=>{
      if(!themeMenu.contains(e.target) && e.target !== themeBtn){
        closeThemeMenu();
      }
    });

    document.addEventListener('keydown', (e)=>{
      if(e.key === 'Escape'){ closeThemeMenu(); }
    });

    // Department submenu (blur + pop tiles)
    const subOverlay = document.getElementById('subOverlay');
    const subGrid = document.getElementById('subGrid');
    const subTitleEl = document.getElementById('subTitle');
    const subClose = document.getElementById('subClose');

    function openSubmenu(title, children){
      subTitleEl.textContent = title || 'Department';
      subGrid.innerHTML = '';
      (children||[]).forEach(ch=>{
        const b = document.createElement('a');
        b.className = 'subTile';
        b.href = ch.href || '#';
        b.target = '_self';
        b.rel = 'noopener noreferrer';
        b.textContent = ch.title || '';

        // Smart protocol handling for Teams / Copilot / OpenVPN
        b.addEventListener('click', (e)=>{
          if(openSmartLink(b.href)){ e.preventDefault(); return; }
        });

        subGrid.appendChild(b);
      });
      document.body.classList.add('subOpen');
      subOverlay.classList.add('show');
      subOverlay.setAttribute('aria-hidden','false');
    }

    function closeSubmenu(){
      subOverlay.classList.remove('show');
      subOverlay.setAttribute('aria-hidden','true');
      setTimeout(()=> document.body.classList.remove('subOpen'), 220);
    }

    subClose.addEventListener('click', closeSubmenu);
    subOverlay.addEventListener('click', (e)=>{ if(e.target === subOverlay) closeSubmenu(); });
    document.addEventListener('keydown', (e)=>{ if(e.key === 'Escape' && subOverlay.classList.contains('show')) closeSubmenu(); });


    function openSmartLink(url){
      if(!url) return false;

      // Teams (New Teams): use HTTPS deep links, with msteams fallback
      if(/^https:\/\/teams\.microsoft\.com\//i.test(url)){
        const proto = url.replace(/^https:\/\/teams\.microsoft\.com/i, 'msteams:');
        try { window.location.href = proto; } catch(e){}
        setTimeout(()=>{ try{ window.open(url, '_blank', 'noopener'); } catch(e){} }, 700);
        return true;
      }

      // Windows Copilot (if available)
      if(/^ms-copilot:\/\//i.test(url)){
        try { window.location.href = url; } catch(e){}
        setTimeout(()=>{ try{ window.open('https://copilot.microsoft.com/', '_blank', 'noopener'); } catch(e){} }, 700);
        return true;
      }

      // OpenVPN Connect (if protocol handler is installed)
      if(/^openvpn:\/\//i.test(url)){
        try { window.location.href = url; } catch(e){}
        setTimeout(()=>{ try{ window.open('https://openvpn.net/client/', '_blank', 'noopener'); } catch(e){} }, 700);
        return true;
      }

      return false;
    }


    loadTheme();
    // User name (welcome overlay + persistent + editable)
    const usernameEl = document.getElementById('username');
    const editNameEl = document.getElementById('editName');
    const avatarEl = document.getElementById('avatar');

    const welcomeOverlay = document.getElementById('welcomeOverlay');
    const nameInput = document.getElementById('nameInput');
    const saveNameBtn = document.getElementById('saveName');

    function initialsFrom(name){
      const parts = String(name||'').trim().split(/\s+/).filter(Boolean);
      if(parts.length === 0) return 'U';
      const a = parts[0][0] || 'U';
      const b = (parts.length > 1 ? parts[parts.length-1][0] : '') || '';
      return (a + b).toUpperCase();
    }

    function applyUser(name){
      const safe = (name && String(name).trim()) ? String(name).trim() : 'User';
      usernameEl.textContent = safe;
      avatarEl.textContent = initialsFrom(safe);
    }

    function openWelcome(prefill){
      document.body.classList.add('hasWelcome');
      welcomeOverlay.classList.add('show');
      welcomeOverlay.setAttribute('aria-hidden','false');
      nameInput.value = (prefill && String(prefill).trim()) ? String(prefill).trim() : '';
      requestAnimationFrame(()=> setTimeout(()=> nameInput.focus(), 60));
    }

    function closeWelcome(){
      welcomeOverlay.classList.remove('show');
      welcomeOverlay.setAttribute('aria-hidden','true');
      const dur = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--fadeDur')) || 520;
      setTimeout(()=> document.body.classList.remove('hasWelcome'), Math.max(260, dur));
    }

    function saveName(){
      const v = String(nameInput.value || '').trim();
      const name = v ? v : 'User';
      localStorage.setItem('intranetUserName', name);
      applyUser(name);
      closeWelcome();
    }

    function loadUser(){
      const stored = localStorage.getItem('intranetUserName');
      if(!stored){
        openWelcome('');
      } else {
        applyUser(stored);
      }
    }

    saveNameBtn.addEventListener('click', saveName);
    nameInput.addEventListener('keydown', (e)=>{ if(e.key === 'Enter'){ e.preventDefault(); saveName(); } });

    editNameEl.addEventListener('click', (e)=>{
      e.preventDefault();
      const current = localStorage.getItem('intranetUserName') || usernameEl.textContent || '';
      openWelcome(current);
    });

    loadUser();

    // background images per tile
    const BG_BY_KEY = {
            home:     "https://stingraymanufacturers.github.io/departmenttiles/home.png",
firewalls: "https://stingraymanufacturers.github.io/departmenttiles/departments.png",
      msadmin:   "https://stingraymanufacturers.github.io/departmenttiles/companyresources.jpeg",
      tools:     "https://stingraymanufacturers.github.io/departmenttiles/newtools.png"
    };

    const bgEl = document.getElementById("bgImage");
    let currentSectionKey = "home";

    // preload images
    const _preloaded = new Map();
    function preload(url){
      if(!url) return Promise.resolve();
      if(_preloaded.has(url)) return _preloaded.get(url);
      const p = new Promise((res)=>{
        const img = new Image();
        img.onload = ()=>res(true);
        img.onerror = ()=>res(false);
        img.src = url;
      });
      _preloaded.set(url, p);
      return p;
    }
    Object.values(BG_BY_KEY).forEach(preload);

    // crossfade background
    let bgSwapToken = 0;
    async function setBg(key){
      const url = BG_BY_KEY[key];
      if(!url) return;

      const token = ++bgSwapToken;
      await preload(url);
      if(token !== bgSwapToken) return;

      bgEl.classList.add("fadeOut");
      const dur = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--fadeDur')) || 520;

      setTimeout(()=>{
        if(token !== bgSwapToken) return;
        bgEl.style.backgroundImage = `url("${url}")`;
        requestAnimationFrame(()=>{
          if(token !== bgSwapToken) return;
          bgEl.classList.remove("fadeOut");
        });
      }, Math.max(120, Math.min(260, dur * 0.45)));
    }

    const sections = {
      home: { type: "home" },
firewalls: { type: "tiles", items: [
        { title: "IT Department", desc: "", img: "https://stingraymanufacturers.github.io/departmenttiles/it-hover.webp", href: "#", pos: "center 8%" },
        { title: "Executives", desc: "", img: "https://stingraymanufacturers.github.io/departmenttiles/executive1.webp", href: "#" },
        { title: "Admin Department", desc: "", img: "https://stingraymanufacturers.github.io/departmenttiles/admin.webp", href: "#" , children: [{ title: "Sales" }, { title: "Debtors" }, { title: "JHB Admin" }] },
        { title: "Service Department", desc: "", img: "https://stingraymanufacturers.github.io/departmenttiles/service.webp", href: "#" , children: [{ title: "Cape Town" }, { title: "Johannesburg" }] },
        { title: "Planning Department", desc: "", img: "https://stingraymanufacturers.github.io/departmenttiles/planning.webp", href: "#" },

        { title: "Human Resources", desc: "", img: "https://stingraymanufacturers.github.io/departmenttiles/admin-hover.webp", href: "#" },
        { title: "Finance Department", desc: "", img: "https://stingraymanufacturers.github.io/departmenttiles/shipping-hover.webp", href: "#" },
        { title: "Quality Control", desc: "", img: "https://stingraymanufacturers.github.io/departmenttiles/quality.webp", href: "#" },
        { title: "Warehouse", desc: "", img: "https://stingraymanufacturers.github.io/departmenttiles/warehouse.webp", href: "#" , children: [{ title: "Production" }, { title: "Dispatch" }, { title: "Receiving" }, { title: "Finished Goods" }, { title: "Heater Assembly" }] },
        { title: "Training", desc: "", img: "https://stingraymanufacturers.github.io/departmenttiles/training.webp", href: "#" },
        { title: "Operations", desc: "", img: "https://stingraymanufacturers.github.io/departmenttiles/training-hover.webp", href: "#" },
        { title: "KAMs & Reps", desc: "", img: "https://stingraymanufacturers.github.io/departmenttiles/e-com-hover.webp", href: "#" }
      ] },
      msadmin: { type:"tiles", items: [
  { title: "Employee of the Month", desc: "", href: "#", img: "https://stingraymanufacturers.github.io/departmenttiles/employee.png" },
  { title: "Monthly Newsletter", desc: "", href: "#", img: "https://stingraymanufacturers.github.io/departmenttiles/newsletter.png" },
  { title: "HR Forms", desc: "", href: "#", img: "https://stingraymanufacturers.github.io/departmenttiles/newhrforms.png" },
  { title: "ISO 9001 QMS Documents", desc: "", href: "#", img: "https://stingraymanufacturers.github.io/departmenttiles/iso9001.png" }
]},
      tools: { type: "tiles", items: [
        { title: "Teams", desc: "", href: "#", action: "teams", img: "https://stingraymanufacturers.github.io/departmenttiles/teams.png" },

        { title: "OpenVPN", desc: "", href: "openvpn://", action: "link", img: "https://stingraymanufacturers.github.io/departmenttiles/openvpn.png" },
        { title: "Remote SAP", desc: "", href: "https://remote.stingray.co.za:8100/dispatcher/", action: "link", img: "https://stingraymanufacturers.github.io/departmenttiles/remotesap.png" },
        { title: "SharePoint", desc: "", href: "https://stingrayacc.sharepoint.com/_layouts/15/sharepoint.aspx", action: "link", img: "https://stingraymanufacturers.github.io/departmenttiles/sharepoint.png" }
      ] }
    };

    // DEPT_PRELOAD: warm-cache department images in idle time
    (function(){
      try{
        const urls = (sections.firewalls && sections.firewalls.items ? sections.firewalls.items : [])
          .map(i=>i.img).filter(Boolean);
        const run = ()=> urls.forEach(preload);
        if('requestIdleCallback' in window){
          requestIdleCallback(run, { timeout: 1200 });

          setTimeout(run, 250);
        }
      }catch(e){}
    })();

    const pop = document.getElementById('pop');
    const popBody = document.getElementById('popBody');
    const wraps = Array.from(document.querySelectorAll('.tilewrap'));
    const tiles = Array.from(document.querySelectorAll('.tile'));

    
    function openTeamsOverlay(){
      fadePopTo(()=>{
        popTitle.textContent = "Teams";
        popBody.classList.remove("grid5","resources","toolsArea");
        popBody.innerHTML = `
          <div class="glassPanel" style="max-width:980px;">
            <div style="font-weight:880;font-size:18px;margin-bottom:10px;">Quick Actions</div>
            <div style="display:flex;gap:14px;flex-wrap:wrap;">
              <a class="subtile" href="#" data-teams="meeting" target="_blank" rel="noopener noreferrer">
                <div class="t">Create a Meeting</div>
                <div class="d">Schedule a meeting in Teams.</div>
              </a>
              <a class="subtile" href="#" data-teams="calendar" target="_blank" rel="noopener noreferrer">
                <div class="t">Calendar</div>
                <div class="d">Open your Teams calendar.</div>
              </a>
              <a class="subtile" href="#" data-teams="chat" target="_blank" rel="noopener noreferrer">
                <div class="t">New Chat</div>
                <div class="d">Start a new chat.</div>
              </a>
            </div>
          </div>
        `;
      });
    }

function renderTiles(items){
      popBody.innerHTML = "";
      const list = (items || []);
      const isTools = (currentSectionKey === "tools");

      const frag = document.createDocumentFragment();

      for(const item of list){
        const a = document.createElement('a');
        a.className = "subtile" + (isTools ? " toolCircle" : " deptTile");
        a.href = item.href || "#";
        a.rel = "noopener noreferrer";

        if(isTools && item.action === "copilot") a.id = "copilotTool";
        if(isTools && item.action === "teams") a.id = "teamsTool";

        // Departments submenu
        if(!isTools && item.children && item.children.length){
          a.dataset.children = JSON.stringify(item.children);
          a.dataset.title = item.title || "Department";
          a.addEventListener("click", (e)=>{
            e.preventDefault();
            openSubmenu(a.dataset.title, JSON.parse(a.dataset.children));
          });
        }

        // Tools actions
        if(isTools && item.action === "teams"){
          a.target = "_self";
          a.addEventListener("click", (e)=>{ e.preventDefault(); openTeamsOverlay(); });
        } else if(isTools && item.action === "copilot"){
          a.target = "_self";
          a.addEventListener("click", (e)=>{ e.preventDefault(); }); // handled by popup binder
        } else {
          const href = a.href || "";
          if(/^https?:\/\//i.test(href)){
            a.target = "_blank";
            a.addEventListener("click", (e)=>{ e.preventDefault(); window.open(href, "_blank", "noopener"); });
          } else {
            a.target = "_self";
            a.addEventListener("click", (e)=>{ if(openSmartLink(href)){ e.preventDefault(); } });
          }
        }

        if(isTools){
          if(item.img){
            a.style.backgroundImage = `url('${item.img}')`;
          }
          const t = document.createElement('div');
          t.className = 'toolLabel';
          t.textContent = item.title || '';
          a.appendChild(t);
        } else {
          if(item.img){
            const img = document.createElement('img');
            img.className = 'deptImg';
            img.alt = item.title || '';
            img.loading = 'eager';
            img.decoding = 'async';
            img.fetchPriority = 'high';
            img.src = item.img;
            if(item.pos) img.style.objectPosition = item.pos;
            a.appendChild(img);
          }
          const t = document.createElement('div');
          t.className = 'deptTitle';
          t.textContent = item.title || '';
          a.appendChild(t);
        }

        frag.appendChild(a);
      }

      popBody.appendChild(frag);

      if(!list.length){
        const e=document.createElement("div");
        e.style.opacity = ".7";
        e.style.padding = "18px 6px";
        e.textContent = "Nothing here yet.";
        popBody.appendChild(e);
      }
    }

    // smooth content fade when switching sections
    let popToken = 0;
    function fadePopTo(renderFn){
      const token = ++popToken;
      pop.classList.add('show');

      // Smooth fade + slight slide from below (less glitchy for grid)
      popBody.style.willChange = 'opacity, transform';
      popBody.style.transition = 'opacity 220ms var(--fadeEase), transform 220ms var(--fadeEase)';
      popBody.style.opacity = '0';
      popBody.style.transform = 'translateY(12px)';

      // Wait a frame so the browser commits the outgoing state
      requestAnimationFrame(()=>{
        requestAnimationFrame(()=>{
          if(token !== popToken) return;
          renderFn();

          // Enter state
          popBody.style.opacity = '1';
          popBody.style.transform = 'translateY(0)';
        });
      });
    }

    function renderSection(key){
      currentSectionKey = key;
      const cfg=sections[key];
      if(!cfg) return;

      // Departments layout: 15 tiles in a tight 5-column grid
      popBody.classList.toggle('grid5', key === 'firewalls');
      popBody.classList.toggle('resources', key === 'msadmin');
      popBody.classList.toggle('toolsArea', key === 'tools');
document.body.classList.toggle('departmentsMode', key === 'firewalls');

      if(cfg.type==="tiles"){
        return fadePopTo(()=>renderTiles(cfg.items));
      }
      if(cfg.type==="home"){
        return fadePopTo(()=>{ popBody.innerHTML = `
          <div class="glassPanel" style="max-width:1100px;">
            <div style="font-weight:880;font-size:20px;letter-spacing:.2px;margin-bottom:8px;">Dashboard</div>
            <div style="color:rgba(233,238,247,.78);font-size:13px;line-height:1.4;">Quick access to your intranet sections. Use the tiles above to jump into Departments, Company Resources, or Tools.</div>
            <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:14px;">
              <a class=\"subtile\" href=\"#\" style=\"width:320px;min-height:120px;\">
                <div class=\"t\">Departments</div>
                <div class=\"d\">Browse every department and submenu.</div>
              </a>
              <a class=\"subtile\" href=\"#\" style=\"width:320px;min-height:120px;\">
                <div class=\"t\">Company Resources</div>
                <div class=\"d\">Policies, forms, and shared links.</div>
              </a>
              <a class=\"subtile\" href=\"#\" style=\"width:320px;min-height:120px;\">
                <div class=\"t\">Tools</div>
                <div class=\"d\">IT tools and admin portals.</div>
              </a>
            </div>
          </div>`; });
      }

      if(cfg.type==="tasks"){
        return fadePopTo(()=>{ popBody.innerHTML = `<div class="glassPanel">Tasks panel goes here (kept from your previous version).</div>`; });
      }
    }

    function setActive(idx){
      wraps.forEach((w,i)=> w.classList.toggle('active', i===idx));
      tiles.forEach((t,i)=>{
        const on=i===idx;
        if(t.tagName === "A") return;
        t.classList.toggle('active', on);
        t.setAttribute('aria-selected', on?'true':'false');
        t.tabIndex = on ? 0 : -1;
      });

      const key = tiles[idx].dataset.key;
      if(key){
        setBg(key);
        renderSection(key);
      }
    }

    tiles.forEach((tile, idx)=>{
      if(tile.tagName === "A") return;
      tile.addEventListener('click', ()=> setActive(idx));
      tile.addEventListener('keydown', (e)=>{
        if(e.key==='ArrowRight'){ e.preventDefault(); const n=(idx+1)%tiles.length; setActive(n); tiles[n].focus(); }
        if(e.key==='ArrowLeft'){ e.preventDefault(); const p=(idx-1+tiles.length)%tiles.length; setActive(p); tiles[p].focus(); }
        if(e.key==='Enter' || e.key===' '){ e.preventDefault(); setActive(idx); }
      });
    });


    // subtle parallax background scroll
    (function(){
      const speed = 0.12; // lower = more subtle
      const apply = ()=>{
        const y = window.scrollY || document.documentElement.scrollTop || 0;
        document.documentElement.style.setProperty('--bgParallax', `${Math.round(y * -speed)}px`);
      };
      window.addEventListener('scroll', apply, { passive:true });
      window.addEventListener('resize', apply);
      apply();
    })();

    // Teams web-only quick actions (prevents classic Teams protocol error)
    function openTeamsDeepLink(webUrl){
      if(!webUrl) return;
      // Try New Teams desktop app (msteams:) and fall back to web if not installed
      const proto = webUrl.replace(/^https:\/\/teams\.microsoft\.com/i, "msteams:");
      try { window.location.href = proto; } catch(e) {}
      setTimeout(()=>{ try { window.open(webUrl, "_blank", "noopener"); } catch(e) {} }, 750);
    }
    document.addEventListener("click", (e)=>{
      const el = e.target.closest("[data-teams]");
      if(!el) return;
      e.preventDefault();
      const kind = el.getAttribute("data-teams");

      if(kind === "calendar"){
        openTeamsDeepLink("https://teams.microsoft.com/_#/calendarv2");
        return;
      }
      if(kind === "chat"){
        openTeamsDeepLink("https://teams.microsoft.com/_#/conversations/newchat");
        return;
      }
      openTeamsDeepLink("https://teams.microsoft.com/l/meeting/new?subject=");
    });

// Tile actions (Teams submenu + Copilot sidebar)
    document.addEventListener("click", (e)=>{
      const a = e.target.closest(".subtile");
      if(!a) return;

      // Identify the tile by text label (stable in this UI)
      const label = a.querySelector(".t")?.textContent?.trim();

      // Copilot: open sidebar instead of new tab
      if(label === "Copilot"){
        e.preventDefault();
        e.stopPropagation();
        openCopilot("https://m365.cloud.microsoft/chat/?auth=2&home=1&fromcode=cmm55a4s0sl&origindomain=microsoft365");
        return;
      }

      // Teams: open a small popup panel with 3 actions
      if(label === "Teams"){
        e.preventDefault();
        e.stopPropagation();

        // Build a mini popup using your existing pop system
        fadePopTo(()=>{
          popBody.classList.remove("grid5","resources");
          popTitle.textContent = "Teams";

          popBody.innerHTML = `
            <div class="glassPanel" style="max-width:980px;">
              <div style="font-weight:880;font-size:18px;margin-bottom:10px;">Quick Actions</div>
              <div style="display:flex;gap:14px;flex-wrap:wrap;">
                <a class="subtile" href="#" data-teams="meeting">
                  <div class="t">Create a Meeting</div>
                  <div class="d">Schedule a meeting in Teams.</div>
                </a>
                <a class="subtile" href="#" data-teams="calendar">
                  <div class="t">Calendar</div>
                  <div class="d">Open your Teams calendar.</div>
                </a>
                <a class="subtile" href="#" data-teams="chat">
                  <div class="t">New Chat</div>
                  <div class="d">Start a new chat.</div>
                </a>
              </div>
            </div>
          `;
        });
        return;
      }
    });

    // Handle Teams submenu actions (always new tabs; new Teams compatible)
    document.addEventListener("click", (e)=>{
      const el = e.target.closest("[data-teams]");
      if(!el) return;
      e.preventDefault();
      const kind = el.getAttribute("data-teams");

      if(kind === "calendar"){
        openTeamsDeepLink("https://teams.microsoft.com/_#/calendarv2", "msteams:/l/calendar/");
        return;
      }
      if(kind === "chat"){
        openTeamsDeepLink("https://teams.microsoft.com/_#/conversations/newchat", "msteams:/l/chat/0/0");
        return;
      }
      // Create a meeting
      openTeamsDeepLink("https://teams.microsoft.com/l/meeting/new?subject=", "msteams:/l/meeting/new");
    });



    // OpenVPN protocol handler reliability
    document.addEventListener("click", (e)=>{
      const a = e.target.closest(".subtile");
      if(!a) return;
      const label = a.querySelector(".t")?.textContent?.trim();
      if(label !== "OpenVPN") return;
      // try to trigger the protocol handler in the same tab (most reliable)
      e.preventDefault();
      window.location.href = "openvpn://";
    });



    // ===== Teams: open mini tools overlay above tile =====
    function openTeamsOverlay(){
      const teamsTool = document.getElementById('teamsTool');
      const overlay = document.getElementById('teamsOverlay');
      const rail = document.getElementById('teamsFabRail');
      if(!teamsTool || !overlay || !rail) return;

      function positionOverlay(){
        const r = teamsTool.getBoundingClientRect();
        const wrap = overlay.querySelector('.teams-fab-wrap');
        if(!wrap) return;
        const top = Math.max(90, r.top - 120);
        wrap.style.top = top + 'px';
      }

      function openOverlay(e){
        if(e){
          e.preventDefault();
          e.stopPropagation();
          if(e.stopImmediatePropagation) e.stopImmediatePropagation();
        }
        positionOverlay();
        overlay.classList.add('is-open');
        overlay.setAttribute('aria-hidden','false');
        rail.setAttribute('aria-hidden','false');
        document.body.style.overflow = 'hidden';
      }

      function closeOverlay(){
        overlay.classList.remove('is-open');
        overlay.setAttribute('aria-hidden','true');
        rail.setAttribute('aria-hidden','true');
        document.body.style.overflow = '';
      }

      teamsTool.addEventListener('click', openOverlay, true);

      overlay.addEventListener('click', (e)=>{
        const close = e.target.closest('[data-close="teams"]');
        if(close) closeOverlay();
        // click outside rail closes too
        if(e.target === overlay) closeOverlay();
      });

      window.addEventListener('keydown', (e)=>{
        if(e.key === 'Escape' && overlay.classList.contains('is-open')) closeOverlay();
      });

      window.addEventListener('resize', ()=>{
        if(overlay.classList.contains('is-open')) positionOverlay();
      }, { passive:true });

      window.addEventListener('scroll', ()=>{
        if(overlay.classList.contains('is-open')) positionOverlay();
      }, { passive:true });
    }

    // init teams overlay binding
    (function(){ openTeamsOverlay(); })();


    // start on Firewalls background
    setBg("home");
    setActive(0);

    

// ===== Copilot: open in side window only (reuse same window) =====
  (function(){
    const COPILOT_URL = "https://m365.cloud.microsoft/chat/?auth=2&home=1&fromcode=cmm6e0ny53n";
    let copilotWin = null;

    function openCopilotPopup(){
      const w = 520;
      const h = Math.min(900, Math.max(640, window.screen.height - 120));
      const left = Math.max(0, window.screenX + window.outerWidth - w - 18);
      const top  = Math.max(0, window.screenY + 60);

      const features = [
        "popup=yes",
        "noopener=yes",
        "noreferrer=yes",
        "width=" + w,
        "height=" + h,
        "left=" + left,
        "top=" + top,
        "resizable=yes",
        "scrollbars=yes"
      ].join(",");

      if(copilotWin && !copilotWin.closed){
        try{ copilotWin.focus(); return; }catch(e){}
      }

      copilotWin = window.open(COPILOT_URL, "stingrayCopilot", features);
      if(copilotWin){ try{ copilotWin.focus(); }catch(e){} }
    }

    function bind(){
      document.addEventListener("click", function(e){
        const openTile = e.target && e.target.closest ? e.target.closest("#copilotTool") : null;
        if(openTile){
          e.preventDefault();
          openCopilotPopup();
          return;
        }
      }, true);
    }

    if(document.readyState === "loading"){
      document.addEventListener("DOMContentLoaded", bind);
    }else{
      bind();
    }
  })(); 

</script>
